spring.application.name=task-manager
spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanager
spring.datasource.username=postgres
spring.datasource.password=2435

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Default level for everything not matched below
logging.level.root=INFO
# Your own code: show DEBUG (and above) so the debug-level logs we just added are visible locally
logging.level.com.amodugu.taskmanager=DEBUG
# SLF4J-routed replacement for spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG